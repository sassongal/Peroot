name: CI

# Quality gate for the Next.js app (Prut/web). Runs on every push to main and on
# every PR targeting main. `quality` is green out of the box (no secrets needed)
# and is the check to require in branch protection — it catches the type errors
# that have broken `main` before. `build` additionally compiles the app and only
# runs once the three Supabase secrets are set (see README note at the bottom).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: Prut/web

jobs:
  quality:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    # Dummy values so any imported module that runs env-validation doesn't throw
    # during unit tests. Tests must not hit real services (they are mocked).
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ci.example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Prut/web/package-lock.json
      - name: Install
        run: npm ci
      # Hard gate: the two errors that have broken main before were both type
      # errors, so tsc is the essential check. Tests guard behaviour regressions.
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test
      # Informational for now — the repo has ~41 pre-existing eslint errors that
      # the per-file pre-commit hook never enforced repo-wide. Clear that debt,
      # then remove `continue-on-error` to make lint a hard gate too.
      - name: Lint (non-blocking)
        continue-on-error: true
        run: npx eslint src

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: quality
    # Skips cleanly (green) until the Supabase secrets are added to the repo, so
    # adopting CI never turns main red before you configure it.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Check for build secrets
        id: gate
        run: |
          if [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping build — set NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY as repo secrets to enable it."
          fi
      - if: steps.gate.outputs.ready == 'true'
        uses: actions/checkout@v4
      - if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Prut/web/package-lock.json
      - if: steps.gate.outputs.ready == 'true'
        name: Install
        run: npm ci
      - if: steps.gate.outputs.ready == 'true'
        name: Build
        run: npm run build
