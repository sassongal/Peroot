name: Deploy to Cloudflare Workers

on:
  push:
    branches: [cloudflare-migration]
    paths:
      - "Prut/web/**"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Prut/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Prut/web/package-lock.json

      - name: Install dependencies (main)
        run: npm ci --legacy-peer-deps

      - name: Install dependencies (extract-url-worker)
        working-directory: Prut/web/extract-url-worker
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Install dependencies (extract-file-worker)
        working-directory: Prut/web/extract-file-worker
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Build for Cloudflare
        run: npm run build:cloudflare
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://www.peroot.space
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DISABLE_WEBPACK_PLUGIN: "1"

      # Deploy sibling Workers FIRST so the main Worker's Service Bindings
      # resolve on first deploy. Wrangler errors out if the bound service
      # doesn't exist yet.
      - name: Deploy peroot-extract-url
        working-directory: Prut/web/extract-url-worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Push EXTRACT_SECRET to peroot-extract-url
        working-directory: Prut/web/extract-url-worker
        if: ${{ secrets.EXTRACT_SECRET != '' }}
        run: echo "${{ secrets.EXTRACT_SECRET }}" | npx wrangler secret put EXTRACT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy peroot-extract-file
        working-directory: Prut/web/extract-file-worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Push EXTRACT_SECRET to peroot-extract-file
        working-directory: Prut/web/extract-file-worker
        if: ${{ secrets.EXTRACT_SECRET != '' }}
        run: echo "${{ secrets.EXTRACT_SECRET }}" | npx wrangler secret put EXTRACT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy main peroot Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Push EXTRACT_SECRET to main peroot Worker
        if: ${{ secrets.EXTRACT_SECRET != '' }}
        run: echo "${{ secrets.EXTRACT_SECRET }}" | npx wrangler secret put EXTRACT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
