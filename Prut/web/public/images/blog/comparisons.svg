<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Balance scale -->
  <!-- Central pivot -->
  <circle cx="600" cy="320" r="8" fill="#6366f1" fill-opacity="0.4"/>
  <circle cx="600" cy="320" r="5" fill="#6366f1" fill-opacity="0.6"/>
  <!-- Vertical post -->
  <line x1="600" y1="320" x2="600" y2="460" stroke="#6366f1" stroke-opacity="0.25" stroke-width="2"/>
  <!-- Base -->
  <line x1="540" y1="460" x2="660" y2="460" stroke="#6366f1" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
  <line x1="520" y1="470" x2="680" y2="470" stroke="#6366f1" stroke-opacity="0.15" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Balance beam (slightly tilted left down) -->
  <line x1="280" y1="290" x2="920" y2="270" stroke="#6366f1" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"/>
  <!-- Left pan strings -->
  <line x1="280" y1="290" x2="260" y2="350" stroke="#6366f1" stroke-opacity="0.22" stroke-width="1.5"/>
  <line x1="280" y1="290" x2="330" y2="350" stroke="#6366f1" stroke-opacity="0.22" stroke-width="1.5"/>
  <!-- Left pan -->
  <path d="M240,350 Q295,380 340,350" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1.5" fill-rule="evenodd"/>
  <!-- Right pan strings -->
  <line x1="920" y1="270" x2="900" y2="330" stroke="#6366f1" stroke-opacity="0.22" stroke-width="1.5"/>
  <line x1="920" y1="270" x2="970" y2="330" stroke="#6366f1" stroke-opacity="0.22" stroke-width="1.5"/>
  <!-- Right pan -->
  <path d="M880,330 Q935,360 980,330" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Items being weighed (abstract shapes) -->
  <!-- Left pan item -->
  <rect x="260" y="335" width="60" height="18" rx="4" fill="#6366f1" fill-opacity="0.15"/>
  <!-- Right pan items (lighter - two smaller) -->
  <rect x="897" y="314" width="30" height="14" rx="3" fill="#6366f1" fill-opacity="0.12"/>
  <rect x="932" y="314" width="30" height="14" rx="3" fill="#6366f1" fill-opacity="0.12"/>
  <!-- Comparison columns on either side -->
  <!-- Left column headers -->
  <g stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" fill="none">
    <rect x="80" y="150" width="180" height="300" rx="4"/>
    <line x1="80" y1="185" x2="260" y2="185"/>
  </g>
  <g stroke="#6366f1" stroke-opacity="0.1" stroke-width="1" stroke-linecap="round">
    <line x1="100" y1="215" x2="240" y2="215"/>
    <line x1="100" y1="240" x2="230" y2="240"/>
    <line x1="100" y1="265" x2="240" y2="265"/>
    <line x1="100" y1="290" x2="225" y2="290"/>
    <line x1="100" y1="315" x2="235" y2="315"/>
    <line x1="100" y1="340" x2="230" y2="340"/>
    <line x1="100" y1="365" x2="240" y2="365"/>
    <line x1="100" y1="390" x2="220" y2="390"/>
  </g>
  <!-- Right column headers -->
  <g stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" fill="none">
    <rect x="940" y="150" width="180" height="300" rx="4"/>
    <line x1="940" y1="185" x2="1120" y2="185"/>
  </g>
  <g stroke="#6366f1" stroke-opacity="0.1" stroke-width="1" stroke-linecap="round">
    <line x1="960" y1="215" x2="1100" y2="215"/>
    <line x1="960" y1="240" x2="1090" y2="240"/>
    <line x1="960" y1="265" x2="1100" y2="265"/>
    <line x1="960" y1="290" x2="1085" y2="290"/>
    <line x1="960" y1="315" x2="1095" y2="315"/>
    <line x1="960" y1="340" x2="1090" y2="340"/>
    <line x1="960" y1="365" x2="1100" y2="365"/>
    <line x1="960" y1="390" x2="1080" y2="390"/>
  </g>
  <!-- VS divider in center -->
  <line x1="600" y1="140" x2="600" y2="230" stroke="#6366f1" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4,6"/>
  <!-- Subtle grid -->
  <g stroke="#6366f1" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
</svg>
