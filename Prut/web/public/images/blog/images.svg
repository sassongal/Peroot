<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#150a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Stacked image frames - art gallery -->
  <!-- Back frame -->
  <rect x="490" y="155" width="300" height="220" rx="4" fill="none" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1" transform="rotate(-6 640 265)"/>
  <!-- Middle frame -->
  <rect x="490" y="155" width="300" height="220" rx="4" fill="none" stroke="#a855f7" stroke-opacity="0.18" stroke-width="1" transform="rotate(3 640 265)"/>
  <!-- Front frame - main -->
  <rect x="470" y="160" width="300" height="210" rx="4" fill="#a855f7" fill-opacity="0.05" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Image content - abstract landscape inside frame -->
  <rect x="480" y="170" width="280" height="190" rx="2" fill="#a855f7" fill-opacity="0.04"/>
  <!-- Landscape: hills -->
  <ellipse cx="540" cy="330" rx="80" ry="50" fill="#a855f7" fill-opacity="0.1"/>
  <ellipse cx="680" cy="340" rx="100" ry="55" fill="#a855f7" fill-opacity="0.08"/>
  <!-- Sun circle -->
  <circle cx="620" cy="215" r="20" fill="#a855f7" fill-opacity="0.2"/>
  <circle cx="620" cy="215" r="14" fill="#a855f7" fill-opacity="0.25"/>
  <!-- Palette dots floating outside frame -->
  <circle cx="350" cy="200" r="16" fill="#a855f7" fill-opacity="0.2" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1.5"/>
  <circle cx="320" cy="240" r="12" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="360" cy="270" r="10" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.22" stroke-width="1"/>
  <circle cx="330" cy="300" r="8" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="370" cy="330" r="14" fill="#a855f7" fill-opacity="0.14" stroke="#a855f7" stroke-opacity="0.22" stroke-width="1"/>
  <!-- Right side palette dots -->
  <circle cx="850" cy="200" r="14" fill="#a855f7" fill-opacity="0.18" stroke="#a855f7" stroke-opacity="0.28" stroke-width="1"/>
  <circle cx="880" cy="240" r="10" fill="#a855f7" fill-opacity="0.14" stroke="#a855f7" stroke-opacity="0.24" stroke-width="1"/>
  <circle cx="840" cy="275" r="12" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="870" cy="310" r="8" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.18" stroke-width="1"/>
  <!-- Sparkle stars -->
  <g stroke="#a855f7" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round">
    <line x1="150" y1="150" x2="150" y2="166"/>
    <line x1="142" y1="158" x2="158" y2="158"/>
    <line x1="145" y1="153" x2="155" y2="163"/>
    <line x1="155" y1="153" x2="145" y2="163"/>
  </g>
  <g stroke="#a855f7" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round">
    <line x1="1050" y1="450" x2="1050" y2="462"/>
    <line x1="1044" y1="456" x2="1056" y2="456"/>
    <line x1="1046" y1="452" x2="1054" y2="460"/>
    <line x1="1054" y1="452" x2="1046" y2="460"/>
  </g>
  <g stroke="#a855f7" stroke-opacity="0.2" stroke-width="1" stroke-linecap="round">
    <line x1="200" y1="480" x2="200" y2="490"/>
    <line x1="195" y1="485" x2="205" y2="485"/>
  </g>
  <g stroke="#a855f7" stroke-opacity="0.2" stroke-width="1" stroke-linecap="round">
    <line x1="1000" y1="150" x2="1000" y2="162"/>
    <line x1="994" y1="156" x2="1006" y2="156"/>
  </g>
  <!-- Subtle grid -->
  <g stroke="#a855f7" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Bottom small frames -->
  <rect x="200" y="430" width="120" height="85" rx="3" fill="none" stroke="#a855f7" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="880" y="430" width="120" height="85" rx="3" fill="none" stroke="#a855f7" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="540" y="440" width="80" height="55" rx="2" fill="none" stroke="#a855f7" stroke-opacity="0.1" stroke-width="1"/>
  <rect x="640" y="440" width="80" height="55" rx="2" fill="none" stroke="#a855f7" stroke-opacity="0.1" stroke-width="1"/>
</svg>
