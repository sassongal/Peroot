<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d1f2d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Rising bar chart shapes - business/growth -->
  <rect x="320" y="400" width="40" height="130" fill="#06b6d4" fill-opacity="0.08" rx="3"/>
  <rect x="380" y="340" width="40" height="190" fill="#06b6d4" fill-opacity="0.1" rx="3"/>
  <rect x="440" y="280" width="40" height="250" fill="#06b6d4" fill-opacity="0.12" rx="3"/>
  <rect x="500" y="220" width="40" height="310" fill="#06b6d4" fill-opacity="0.1" rx="3"/>
  <rect x="560" y="160" width="40" height="370" fill="#06b6d4" fill-opacity="0.12" rx="3"/>
  <rect x="620" y="200" width="40" height="330" fill="#06b6d4" fill-opacity="0.1" rx="3"/>
  <rect x="680" y="140" width="40" height="390" fill="#06b6d4" fill-opacity="0.14" rx="3"/>
  <rect x="740" y="100" width="40" height="430" fill="#06b6d4" fill-opacity="0.12" rx="3"/>
  <rect x="800" y="80" width="40" height="450" fill="#06b6d4" fill-opacity="0.1" rx="3"/>
  <!-- Trend line -->
  <polyline points="340,390 400,330 460,268 520,210 580,150 640,190 700,130 760,90 820,70" fill="none" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots on trend line -->
  <circle cx="340" cy="390" r="4" fill="#06b6d4" fill-opacity="0.5"/>
  <circle cx="460" cy="268" r="4" fill="#06b6d4" fill-opacity="0.5"/>
  <circle cx="580" cy="150" r="4" fill="#06b6d4" fill-opacity="0.5"/>
  <circle cx="700" cy="130" r="4" fill="#06b6d4" fill-opacity="0.5"/>
  <circle cx="820" cy="70" r="5" fill="#06b6d4" fill-opacity="0.7"/>
  <!-- Grid -->
  <g stroke="#06b6d4" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="530" x2="1200" y2="530"/>
    <line x1="0" y1="430" x2="1200" y2="430"/>
    <line x1="0" y1="330" x2="1200" y2="330"/>
    <line x1="0" y1="230" x2="1200" y2="230"/>
    <line x1="0" y1="130" x2="1200" y2="130"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <!-- Upward arrow accent -->
  <polyline points="1000,450 1000,150 1080,230" fill="none" stroke="#06b6d4" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="1000,150 920,230" fill="none" stroke="#06b6d4" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Abstract circles -->
  <circle cx="150" cy="180" r="60" fill="none" stroke="#06b6d4" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="150" cy="180" r="40" fill="none" stroke="#06b6d4" stroke-opacity="0.14" stroke-width="1"/>
  <circle cx="150" cy="180" r="20" fill="#06b6d4" fill-opacity="0.08"/>
  <circle cx="1050" cy="480" r="50" fill="none" stroke="#06b6d4" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="1050" cy="480" r="30" fill="#06b6d4" fill-opacity="0.06"/>
  <!-- Corner accent dots -->
  <circle cx="50" cy="50" r="2" fill="#06b6d4" fill-opacity="0.4"/>
  <circle cx="1150" cy="50" r="2" fill="#06b6d4" fill-opacity="0.4"/>
  <circle cx="50" cy="580" r="2" fill="#06b6d4" fill-opacity="0.4"/>
  <circle cx="1150" cy="580" r="2" fill="#06b6d4" fill-opacity="0.4"/>
</svg>
