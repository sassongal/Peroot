<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="30%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Megaphone shape pointing right -->
  <g stroke="#3b82f6" fill="none" stroke-linejoin="round">
    <!-- Main megaphone body -->
    <polygon points="500,260 500,370 580,370 720,440 720,190 580,260" fill="#3b82f6" fill-opacity="0.08" stroke-opacity="0.25" stroke-width="1.5"/>
    <!-- Handle -->
    <rect x="450" y="295" width="55" height="40" rx="5" fill="#3b82f6" fill-opacity="0.1" stroke-opacity="0.2" stroke-width="1.5"/>
  </g>
  <!-- Sound waves emanating from megaphone -->
  <g stroke="#3b82f6" fill="none" stroke-linecap="round">
    <path d="M740,270 Q800,315 740,360" stroke-opacity="0.3" stroke-width="2"/>
    <path d="M760,240 Q850,315 760,390" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M780,210 Q900,315 780,420" stroke-opacity="0.14" stroke-width="1.5"/>
    <path d="M800,180 Q960,315 800,450" stroke-opacity="0.09" stroke-width="1"/>
    <path d="M820,150 Q1020,315 820,480" stroke-opacity="0.06" stroke-width="1"/>
  </g>
  <!-- Floating engagement metrics dots (reach/impressions idea) -->
  <g fill="#3b82f6">
    <circle cx="900" cy="180" r="5" fill-opacity="0.3"/>
    <circle cx="970" cy="220" r="4" fill-opacity="0.25"/>
    <circle cx="1030" cy="160" r="3" fill-opacity="0.2"/>
    <circle cx="1080" cy="240" r="5" fill-opacity="0.28"/>
    <circle cx="960" cy="290" r="3" fill-opacity="0.22"/>
    <circle cx="1050" cy="310" r="4" fill-opacity="0.2"/>
    <circle cx="1100" cy="350" r="3" fill-opacity="0.18"/>
    <circle cx="900" cy="400" r="4" fill-opacity="0.22"/>
    <circle cx="980" cy="440" r="3" fill-opacity="0.2"/>
    <circle cx="1060" cy="420" r="5" fill-opacity="0.25"/>
    <circle cx="1120" cy="480" r="3" fill-opacity="0.15"/>
    <!-- Connection lines from megaphone to dots -->
    <circle cx="850" cy="150" r="3" fill-opacity="0.2"/>
    <circle cx="860" cy="460" r="3" fill-opacity="0.2"/>
  </g>
  <g stroke="#3b82f6" stroke-opacity="0.08" stroke-width="1" fill="none">
    <line x1="740" y1="270" x2="900" y2="180"/>
    <line x1="740" y1="315" x2="1050" y2="310"/>
    <line x1="740" y1="360" x2="900" y2="400"/>
    <line x1="900" y1="180" x2="970" y2="220"/>
    <line x1="970" y1="220" x2="1030" y2="160"/>
    <line x1="1030" y1="160" x2="1080" y2="240"/>
    <line x1="900" y1="400" x2="980" y2="440"/>
    <line x1="980" y1="440" x2="1060" y2="420"/>
  </g>
  <!-- Left side abstract growth chart -->
  <g stroke="#3b82f6" stroke-opacity="0.12" stroke-width="1" fill="none">
    <line x1="100" y1="530" x2="400" y2="530"/>
    <line x1="100" y1="530" x2="100" y2="130"/>
    <polyline points="130,480 180,420 230,380 280,300 330,240 380,180" stroke-opacity="0.2" stroke-width="1.5"/>
    <circle cx="130" cy="480" r="3" fill="#3b82f6" fill-opacity="0.3"/>
    <circle cx="230" cy="380" r="3" fill="#3b82f6" fill-opacity="0.3"/>
    <circle cx="330" cy="240" r="3" fill="#3b82f6" fill-opacity="0.3"/>
    <circle cx="380" cy="180" r="4" fill="#3b82f6" fill-opacity="0.4"/>
  </g>
  <!-- Grid -->
  <g stroke="#3b82f6" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
</svg>
