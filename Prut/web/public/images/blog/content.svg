<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0a1a18"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Large pen/quill nib shape in center -->
  <g stroke="#14b8a6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pen nib -->
    <polygon points="600,160 680,310 600,380 520,310" fill="#14b8a6" fill-opacity="0.07" stroke-opacity="0.22" stroke-width="1.5"/>
    <!-- Pen body -->
    <rect x="575" y="100" width="50" height="80" rx="6" fill="#14b8a6" fill-opacity="0.08" stroke-opacity="0.18" stroke-width="1.5"/>
    <!-- Pen slit -->
    <line x1="600" y1="310" x2="600" y2="370" stroke-opacity="0.25" stroke-width="1.5"/>
  </g>
  <!-- Writing lines below pen, like text being written -->
  <g stroke="#14b8a6" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round">
    <line x1="380" y1="450" x2="820" y2="450"/>
  </g>
  <g stroke="#14b8a6" stroke-opacity="0.1" stroke-width="1.5" stroke-linecap="round">
    <line x1="350" y1="475" x2="790" y2="475"/>
    <line x1="370" y1="500" x2="760" y2="500"/>
    <line x1="390" y1="525" x2="730" y2="525"/>
  </g>
  <!-- Horizontal text-like lines left side - document feel -->
  <g stroke="#14b8a6" stroke-opacity="0.1" stroke-width="1.5" stroke-linecap="round">
    <line x1="80" y1="180" x2="280" y2="180"/>
    <line x1="80" y1="205" x2="260" y2="205"/>
    <line x1="80" y1="230" x2="270" y2="230"/>
    <line x1="80" y1="255" x2="240" y2="255"/>
    <line x1="80" y1="280" x2="265" y2="280"/>
    <line x1="80" y1="305" x2="250" y2="305"/>
    <line x1="80" y1="330" x2="275" y2="330"/>
    <line x1="80" y1="355" x2="245" y2="355"/>
  </g>
  <!-- Document border left -->
  <rect x="60" y="155" width="240" height="230" rx="6" fill="none" stroke="#14b8a6" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="60" y1="175" x2="300" y2="175" stroke="#14b8a6" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Document right side -->
  <g stroke="#14b8a6" stroke-opacity="0.1" stroke-width="1.5" stroke-linecap="round">
    <line x1="920" y1="180" x2="1120" y2="180"/>
    <line x1="920" y1="205" x2="1100" y2="205"/>
    <line x1="920" y1="230" x2="1110" y2="230"/>
    <line x1="920" y1="255" x2="1080" y2="255"/>
    <line x1="920" y1="280" x2="1105" y2="280"/>
    <line x1="920" y1="305" x2="1090" y2="305"/>
    <line x1="920" y1="330" x2="1115" y2="330"/>
    <line x1="920" y1="355" x2="1085" y2="355"/>
  </g>
  <rect x="900" y="155" width="240" height="230" rx="6" fill="none" stroke="#14b8a6" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="900" y1="175" x2="1140" y2="175" stroke="#14b8a6" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Flow arrows connecting documents to center pen -->
  <g stroke="#14b8a6" stroke-opacity="0.15" stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="310" y1="270" x2="510" y2="300"/>
    <line x1="890" y1="270" x2="690" y2="300"/>
  </g>
  <!-- Ink drop/splash from nib tip -->
  <circle cx="600" cy="380" r="4" fill="#14b8a6" fill-opacity="0.4"/>
  <circle cx="600" cy="380" r="8" fill="none" stroke="#14b8a6" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="600" cy="380" r="14" fill="none" stroke="#14b8a6" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Grid subtle -->
  <g stroke="#14b8a6" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Corner accents -->
  <g stroke="#14b8a6" stroke-opacity="0.15" stroke-width="1.5" fill="none">
    <polyline points="30,30 30,60 60,60"/>
    <polyline points="1170,30 1170,60 1140,60"/>
    <polyline points="30,600 30,570 60,570"/>
    <polyline points="1170,600 1170,570 1140,570"/>
  </g>
</svg>
