<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Central warning triangle -->
  <polygon points="600,160 750,410 450,410" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-opacity="0.3" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner warning triangle -->
  <polygon points="600,200 720,400 480,400" fill="none" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1" stroke-linejoin="round"/>
  <!-- Exclamation mark body -->
  <rect x="591" y="240" width="18" height="90" rx="9" fill="#ef4444" fill-opacity="0.25"/>
  <circle cx="600" cy="370" r="10" fill="#ef4444" fill-opacity="0.3"/>
  <!-- Outer pulse rings -->
  <polygon points="600,100 800,440 400,440" fill="none" stroke="#ef4444" stroke-opacity="0.1" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="600,50 850,470 350,470" fill="none" stroke="#ef4444" stroke-opacity="0.06" stroke-width="1" stroke-linejoin="round"/>
  <!-- Diagonal warning stripes (hazard lines) in background -->
  <g stroke="#ef4444" stroke-opacity="0.05" stroke-width="20">
    <line x1="-50" y1="0" x2="200" y2="630"/>
    <line x1="100" y1="0" x2="350" y2="630"/>
    <line x1="250" y1="0" x2="500" y2="630"/>
    <line x1="700" y1="0" x2="950" y2="630"/>
    <line x1="850" y1="0" x2="1100" y2="630"/>
    <line x1="1000" y1="0" x2="1250" y2="630"/>
  </g>
  <!-- X marks at corners suggesting errors -->
  <g stroke="#ef4444" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round">
    <line x1="100" y1="100" x2="130" y2="130"/>
    <line x1="130" y1="100" x2="100" y2="130"/>
    <line x1="1070" y1="100" x2="1100" y2="130"/>
    <line x1="1100" y1="100" x2="1070" y2="130"/>
    <line x1="100" y1="500" x2="130" y2="530"/>
    <line x1="130" y1="500" x2="100" y2="530"/>
    <line x1="1070" y1="500" x2="1100" y2="530"/>
    <line x1="1100" y1="500" x2="1070" y2="530"/>
  </g>
  <!-- Small warning triangles scattered -->
  <polygon points="200,200 225,243 175,243" fill="none" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="1000,200 1025,243 975,243" fill="none" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="150,430 170,465 130,465" fill="none" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1" stroke-linejoin="round"/>
  <polygon points="1050,430 1070,465 1030,465" fill="none" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1" stroke-linejoin="round"/>
  <!-- Subtle grid -->
  <g stroke="#ef4444" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
</svg>
