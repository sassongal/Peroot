<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Matrix columns of falling characters (represented as lines/rectangles) -->
  <g fill="#22c55e">
    <!-- Column 1 -->
    <rect x="60" y="20" width="8" height="30" rx="2" fill-opacity="0.4"/>
    <rect x="60" y="65" width="8" height="20" rx="2" fill-opacity="0.25"/>
    <rect x="60" y="100" width="8" height="40" rx="2" fill-opacity="0.15"/>
    <rect x="60" y="160" width="8" height="15" rx="2" fill-opacity="0.08"/>
    <!-- Column 2 -->
    <rect x="120" y="80" width="8" height="25" rx="2" fill-opacity="0.45"/>
    <rect x="120" y="120" width="8" height="35" rx="2" fill-opacity="0.28"/>
    <rect x="120" y="175" width="8" height="20" rx="2" fill-opacity="0.16"/>
    <rect x="120" y="215" width="8" height="50" rx="2" fill-opacity="0.08"/>
    <!-- Column 3 -->
    <rect x="180" y="10" width="8" height="45" rx="2" fill-opacity="0.35"/>
    <rect x="180" y="70" width="8" height="30" rx="2" fill-opacity="0.22"/>
    <rect x="180" y="115" width="8" height="25" rx="2" fill-opacity="0.14"/>
    <!-- Column 4 -->
    <rect x="240" y="140" width="8" height="40" rx="2" fill-opacity="0.42"/>
    <rect x="240" y="195" width="8" height="25" rx="2" fill-opacity="0.26"/>
    <rect x="240" y="240" width="8" height="60" rx="2" fill-opacity="0.14"/>
    <!-- Column 5 -->
    <rect x="300" y="30" width="8" height="20" rx="2" fill-opacity="0.38"/>
    <rect x="300" y="65" width="8" height="45" rx="2" fill-opacity="0.24"/>
    <rect x="300" y="125" width="8" height="30" rx="2" fill-opacity="0.13"/>
    <!-- Right side -->
    <rect x="900" y="40" width="8" height="35" rx="2" fill-opacity="0.38"/>
    <rect x="900" y="90" width="8" height="25" rx="2" fill-opacity="0.22"/>
    <rect x="900" y="130" width="8" height="45" rx="2" fill-opacity="0.13"/>
    <rect x="960" y="100" width="8" height="30" rx="2" fill-opacity="0.42"/>
    <rect x="960" y="145" width="8" height="20" rx="2" fill-opacity="0.26"/>
    <rect x="960" y="180" width="8" height="55" rx="2" fill-opacity="0.14"/>
    <rect x="1020" y="20" width="8" height="50" rx="2" fill-opacity="0.36"/>
    <rect x="1020" y="85" width="8" height="30" rx="2" fill-opacity="0.2"/>
    <rect x="1020" y="130" width="8" height="40" rx="2" fill-opacity="0.12"/>
    <rect x="1080" y="60" width="8" height="25" rx="2" fill-opacity="0.4"/>
    <rect x="1080" y="100" width="8" height="45" rx="2" fill-opacity="0.24"/>
    <rect x="1080" y="160" width="8" height="30" rx="2" fill-opacity="0.14"/>
    <rect x="1140" y="30" width="8" height="40" rx="2" fill-opacity="0.35"/>
    <rect x="1140" y="85" width="8" height="20" rx="2" fill-opacity="0.2"/>
    <!-- Bottom falling -->
    <rect x="60" y="480" width="8" height="30" rx="2" fill-opacity="0.35"/>
    <rect x="60" y="525" width="8" height="50" rx="2" fill-opacity="0.2"/>
    <rect x="120" y="500" width="8" height="40" rx="2" fill-opacity="0.3"/>
    <rect x="120" y="555" width="8" height="30" rx="2" fill-opacity="0.18"/>
    <rect x="180" y="470" width="8" height="55" rx="2" fill-opacity="0.28"/>
    <rect x="180" y="540" width="8" height="25" rx="2" fill-opacity="0.15"/>
    <rect x="240" y="490" width="8" height="45" rx="2" fill-opacity="0.32"/>
    <rect x="300" y="510" width="8" height="35" rx="2" fill-opacity="0.25"/>
    <rect x="900" y="460" width="8" height="60" rx="2" fill-opacity="0.3"/>
    <rect x="960" y="480" width="8" height="40" rx="2" fill-opacity="0.26"/>
    <rect x="1020" y="500" width="8" height="50" rx="2" fill-opacity="0.22"/>
    <rect x="1080" y="470" width="8" height="35" rx="2" fill-opacity="0.28"/>
    <rect x="1140" y="490" width="8" height="55" rx="2" fill-opacity="0.2"/>
  </g>
  <!-- Center code bracket shapes -->
  <g stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round">
    <polyline points="480,220 450,220 450,410 480,410" stroke-opacity="0.3"/>
    <polyline points="720,220 750,220 750,410 720,410" stroke-opacity="0.3"/>
  </g>
  <!-- Inner bracket glow -->
  <g stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round">
    <polyline points="490,245 465,245 465,385 490,385" stroke-opacity="0.15"/>
    <polyline points="710,245 735,245 735,385 710,385" stroke-opacity="0.15"/>
  </g>
  <!-- Horizontal scan lines in center -->
  <g stroke="#22c55e" stroke-opacity="0.08" stroke-width="1">
    <line x1="490" y1="270" x2="710" y2="270"/>
    <line x1="490" y1="295" x2="710" y2="295"/>
    <line x1="490" y1="320" x2="710" y2="320"/>
    <line x1="490" y1="345" x2="710" y2="345"/>
    <line x1="490" y1="370" x2="710" y2="370"/>
  </g>
  <!-- Cursor blink line -->
  <rect x="540" y="308" width="18" height="3" fill="#22c55e" fill-opacity="0.5" rx="1"/>
  <!-- Corner brackets -->
  <g stroke="#22c55e" stroke-opacity="0.2" stroke-width="1.5" fill="none">
    <polyline points="30,30 30,60 60,60"/>
    <polyline points="1170,30 1170,60 1140,60"/>
    <polyline points="30,600 30,570 60,570"/>
    <polyline points="1170,600 1170,570 1140,570"/>
  </g>
</svg>
