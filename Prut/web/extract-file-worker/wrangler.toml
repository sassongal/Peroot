name = "peroot-extract-file"
account_id = "f78ded495dd768bd57b691493c39c5b5"
main = "index.ts"
compatibility_date = "2026-05-05"
compatibility_flags = ["nodejs_compat"]
minify = true

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1.0

# Per-IP rate limit: 30 requests / 60s. File extraction is heavier than
# URL extraction (PDF/DOCX parsing), so cap is tighter. Legit Vercel use
# is ~1-5/min. namespace_id is account-scoped, arbitrary, must be unique.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 30, period = 60 }
